name: pr

# Lints PR titles (conventional commits) and applies a `type:` label.
# Runs on pull_request_target to cover forks — keep it fork-safe: no checkout of
# PR code and no `secrets: inherit` here (see release-actions/pr-title.yml).
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title:
    permissions:
      pull-requests: write
    uses: Daniel-debug-boop/release-actions/.github/workflows/pr-title.yml@main
