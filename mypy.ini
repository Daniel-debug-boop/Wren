[mypy]
# Scope type checking to the first-party `wren` package and the repo's
# top-level scripts. Running `mypy .` from the repo root would otherwise also
# pick up `wren-sdk/wren` (causing a "Duplicate module named wren" error) plus
# unrelated dirs (tests, wren-android, enterprise, frontend, scripts, ...).
# Excluding them mirrors the project's intended command:
#   mypy --config-file dev_config/python/mypy.ini wren/
files = wren/
exclude = (enterprise/|wren-sdk/|wren-android/|wren-ui/|frontend/|tests/|scripts/|android/|docs/|termux/|workspace/|skills/|microagents/|node_modules/|__pycache__/)
